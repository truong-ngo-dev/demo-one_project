spring.application.name=admin
server.port=8082

# DataSource
spring.datasource.url=${DB_MYSQL_URL_ADMIN:jdbc:mysql://localhost:3306/one_project_admin?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 Resource Server — verifies JWT from oauth2 service
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000

# Security debug logging
logging.level.org.springframework.security=TRACE
