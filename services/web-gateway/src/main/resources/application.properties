spring.application.name=web-gateway

# spring-cloud-context is excluded from the gateway starter in pom.xml (see comment there),
# so RefreshAutoConfiguration and LifecycleMvcEndpointAutoConfiguration are no longer on the classpath.
# Disable discovery client auto-config from spring-cloud-commons (not needed — routes use direct URIs).
spring.cloud.discovery.enabled=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379



# OAuth2 Client
spring.security.oauth2.client.registration.web-gateway.provider=web-gateway
spring.security.oauth2.client.registration.web-gateway.client-id=${WEB_GATEWAY_CLIENT_ID:web-gateway}
spring.security.oauth2.client.registration.web-gateway.client-secret=${WEB_GATEWAY_CLIENT_SECRET:secret}
spring.security.oauth2.client.registration.web-gateway.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.web-gateway.redirect-uri={baseUrl}/login/oauth2/code/web-gateway
spring.security.oauth2.client.registration.web-gateway.scope=openid,profile,email

# Explicit endpoints — avoids startup-time OIDC discovery fetch against oauth2-service
spring.security.oauth2.client.provider.web-gateway.authorization-uri=http://localhost:9000/oauth2/authorize
spring.security.oauth2.client.provider.web-gateway.token-uri=http://localhost:9000/oauth2/token
spring.security.oauth2.client.provider.web-gateway.jwk-set-uri=http://localhost:9000/oauth2/jwks
spring.security.oauth2.client.provider.web-gateway.user-info-uri=http://localhost:9000/userinfo
spring.security.oauth2.client.provider.web-gateway.user-name-attribute=sub

# Server
server.port=8090

# Post-login redirect — browser lands here after OAuth2 callback processed (Angular SPA)
app.login.success-redirect-uri=http://localhost:4200/app/dashboard

# Post-logout redirect — browser lands here after OIDC end_session
app.logout.post-redirect-uri=http://localhost:4200
# OIDC end_session endpoint — not discoverable when issuer-uri is absent
app.logout.end-session-uri=http://localhost:9000/connect/logout

# Backend service URIs
webgateway.routes.admin-service.uri=http://localhost:8082
webgateway.routes.oauth2-service.uri=http://localhost:9000
webgateway.routes.property-service.uri=http://localhost:8083
webgateway.routes.party-service.uri=http://localhost:8084

# Security debug logging
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
logging.level.org.springframework.security.web=TRACE
