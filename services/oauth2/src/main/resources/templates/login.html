<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Apartcom Admin</title>
    <style>
        :root {
          --primary-color: #22c55e;
          --primary-hover: #16a34a;
          --text-dark: #0f172a;
          --text-gray: #64748b;
          --bg-light: #f8fafc;
          --border-light: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-light);
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border-radius: 12px;
            padding: 32px;
            box-sizing: border-box;
        }

        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 8px 0;
        }

        .login-subtitle {
            font-size: 1rem;
            color: var(--text-gray);
            margin: 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 1px var(--primary-color);
        }

        .message {
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            text-align: center;
        }

        .message.error {
            background-color: #fee2e2;
            color: #b91c1c;
        }

        .message.locked {
            background-color: #ffedd5;
            color: #9a3412;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 8px;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }
        
        .divider {
          display: flex;
          align-items: center;
          text-align: center;
          color: var(--text-gray);
          font-size: 0.875rem;
          margin: 24px 0;
        }

        .divider::before,
        .divider::after {
          content: '';
          flex: 1;
          border-bottom: 1px solid var(--border-light);
        }

        .divider:not(:empty)::before { margin-right: 1em; }
        .divider:not(:empty)::after { margin-left: 1em; }

        .google-btn {
          height: 48px;
          border-radius: 8px;
          border: 1px solid var(--border-light);
          font-weight: 500;
          color: var(--text-dark);
          display: flex;
          align-items: center;
          justify-content: flex-start; /* Left align to allow absolute positioning of icon */
          gap: 12px;
          background-color: #ffffff;
          transition: all 0.2s ease;
          width: 100%;
          text-decoration: none;
          position: relative; /* For absolute icon positioning */
          padding: 0 16px;
          box-sizing: border-box;
        }

        .google-btn:hover {
          border-color: #9ca3af;
          background-color: #f8fafc;
          box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .google-icon-wrapper {
          position: absolute;
          left: 16px;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .google-icon {
          width: 20px;
          height: 20px;
        }

        .google-btn-text {
            flex: 1;
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1 class="login-title">Apartcom Admin</h1>
            <p class="login-subtitle">Đăng nhập để tiếp tục</p>
        </div>

        <form method="post" action="/login">
            <input type="hidden" name="_csrf" th:if="${_csrf}" th:value="${_csrf.token}" />
            <input type="hidden" name="device_hash" id="device_hash" value="" />

            <div th:if="${param.error}" class="message error">
                <span>Sai tên đăng nhập hoặc mật khẩu.</span>
            </div>
            <div th:if="${param.locked}" class="message locked">
                <span>Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên.</span>
            </div>

            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" required autofocus />
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required />
            </div>

            <button type="submit" class="submit-btn">Đăng nhập</button>
        </form>
        
        <div class="divider">
          <span>hoặc</span>
        </div>

        <button type="button" id="google-btn" th:data-href="${googleAuthUri}" class="google-btn">
          <div class="google-icon-wrapper">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="google-icon">
              <g>
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                <path fill="none" d="M0 0h48v48H0z"></path>
              </g>
            </svg>
          </div>
          <span class="google-btn-text">Đăng nhập với Google</span>
        </button>
    </div>

    <script>
        // Tính device fingerprint một lần, dùng cho cả form login và Google button
        const deviceHashPromise = (async function() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('Apartcom fingerprint 🔒', 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillText('Apartcom fingerprint 🔒', 4, 17);
                const canvasData = canvas.toDataURL();

                const signals = [
                    canvasData,
                    screen.width + 'x' + screen.height,
                    screen.colorDepth,
                    Intl.DateTimeFormat().resolvedOptions().timeZone,
                    navigator.hardwareConcurrency,
                    navigator.language
                ].join('|');

                const encoded = new TextEncoder().encode(signals);
                const hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            } catch (e) {
                return '';
            }
        })();

        // Populate vào hidden input cho LOCAL login
        deviceHashPromise.then(hash => {
            document.getElementById('device_hash').value = hash;
        });

        // Google button — POST device hint trước khi redirect
        document.getElementById('google-btn').addEventListener('click', async function() {
            const googleAuthUri = this.dataset.href;
            try {
                const hash = await deviceHashPromise;
                if (hash) {
                    await fetch('/login/device-hint', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ deviceHash: hash })
                    });
                }
            } catch (e) {
                // ignore — tiếp tục redirect dù POST thất bại
            }
            window.location.href = googleAuthUri;
        });
    </script>
</body>
</html>
