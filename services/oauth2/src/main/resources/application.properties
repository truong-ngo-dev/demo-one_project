spring.application.name=oauth2

# Database
spring.datasource.url=${DB_MYSQL_URL_OAUTH2:jdbc:mysql://localhost:3306/one_project_oauth2?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Spring Session
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
# Distinct cookie name — prevents collision with web-gateway's WEBGW_SESSION cookie
# (browsers share cookie scope across ports on localhost)
spring.session.cookie.name=OAUTH2_SESSION

# Server
server.port=9000

# OAuth2 Authorization Server
spring.security.oauth2.authorizationserver.issuer=http://localhost:9000

# JWT Key encryption
jwt.key.id=${JWT_KEY_ID:apartcom-oauth2-key}
jwt.persistence.password=${JWT_PERSISTENCE_PASSWORD:changeme-secret-password-32chars!!}
jwt.persistence.salt=${JWT_PERSISTENCE_SALT:deadbeef12345678}

# Google OAuth2 (social login)
client.google.client_id=${GOOGLE_CLIENT_ID:443094009014-4chs11j77td3u8kgta32i74djqv0525i.apps.googleusercontent.com}
client.google.secret=${GOOGLE_CLIENT_SECRET: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}

spring.security.oauth2.client.registration.google.provider=google
spring.security.oauth2.client.registration.google.client-id=${client.google.client_id}
spring.security.oauth2.client.registration.google.client-secret=${client.google.secret}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=email

# Admin service (internal)
app.admin-service.base-url=http://localhost:8082

# Web Gateway service (internal)
app.gateway-service.base-url=http://localhost:8090

# CORS
app.cors.allowed-origins=http://localhost:4200,http://localhost:8090

# Security debug logging
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
