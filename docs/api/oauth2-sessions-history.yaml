openapi: 3.0.3
info:
  title: OAuth2 Service — Sessions & Login History API
  description: |
    User self-service endpoints cho sessions và lịch sử đăng nhập.
    Tất cả endpoints yêu cầu Bearer Access Token hợp lệ.
  version: 1.0.0

servers:
  - url: http://localhost:9000
    description: oauth2-service (direct)
  - url: http://localhost:8090/api/oauth2
    description: Qua Web Gateway (Angular dùng URL này)

security:
  - bearerAuth: []

paths:
  /api/v1/admin/iam/overview:
    get:
      summary: UC-011 — Admin IAM Overview Dashboard
      description: |
        Trả về các chỉ số KPI tổng quan cho Admin Dashboard.
        - `totalUsers`: Số user phân biệt có ít nhất 1 device đã đăng ký (proxy local).
        - `totalDevices`: Tổng số thiết bị đã ghi nhận.
        - `activeSessions`: Số phiên đang ACTIVE.
        - `failedLoginsToday`: Số lượt đăng nhập thất bại trong ngày (từ 00:00:00 hôm nay).
      operationId: getIamOverview
      tags:
        - Admin — IAM Dashboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Chỉ số KPI tổng quan thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IamOverviewResponse"
              example:
                data:
                  totalUsers: 150
                  totalDevices: 320
                  activeSessions: 45
                  failedLoginsToday: 12
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller không có quyền ROLE_ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "403"
                message: "Access Denied"

  /api/v1/login-activities/admin:
    get:
      summary: UC-012 — Admin xem toàn bộ lịch sử đăng nhập hệ thống
      description: |
        Trả về lịch sử đăng nhập của toàn hệ thống, phân trang, mới nhất trước.
        Bao gồm cả SUCCESS và FAILED. Trả về userId và username để drill down.
      operationId: adminListAllLoginActivities
      tags:
        - Admin — Monitoring
      parameters:
        - name: ip
          in: query
          required: false
          schema: { type: string, example: "192.168" }
          description: Filter theo IP (partial match)
        - name: result
          in: query
          required: false
          schema:
            type: string
            enum: [SUCCESS, FAILED_WRONG_PASSWORD, FAILED_ACCOUNT_LOCKED, FAILED_SOCIAL]
          description: Filter theo kết quả (exact match)
        - name: username
          in: query
          required: false
          schema: { type: string, example: "john" }
          description: Filter theo username (partial match)
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
        - name: size
          in: query
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginActivityPage"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller không có ROLE_ADMIN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/sessions/admin/active:
    get:
      summary: UC-013 — Admin xem danh sách phiên ACTIVE toàn hệ thống
      description: |
        Trả về tất cả OAuth Sessions đang ACTIVE. Dùng để thống kê online count
        và phát hiện session bất thường cần force terminate.
      operationId: adminListActiveSessions
      tags:
        - Admin — Monitoring
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSessionsResponse"
              example:
                data:
                  - sessionId: "3fa85f64-0000-0000-0000-000000000001"
                    userId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    username: "john.doe"
                    deviceName: "Chrome on macOS"
                    ipAddress: "192.168.1.10"
                    createdAt: "2025-04-05T08:00:00Z"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller không có ROLE_ADMIN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/sessions/admin/{sessionId}:
    delete:
      summary: UC-013 — Admin force terminate một session bất kỳ
      description: |
        Admin revoke bất kỳ session nào. Không check ownership, không có constraint
        "cannot revoke current session". Hành động được ghi audit log kèm adminId.
      operationId: adminForceTerminateSession
      tags:
        - Admin — Monitoring
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: ID session cần force terminate
      responses:
        "204":
          description: Session đã bị terminate thành công
        "404":
          description: Session không tồn tại (02001)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example: { code: "02001", message: "Session not found" }
        "409":
          description: Session không còn ACTIVE (02002)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example: { code: "02002", message: "Session is not active" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller không có ROLE_ADMIN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/admin/users/{userId}/sessions:
    get:
      summary: UC-014 — Admin xem thiết bị & session ACTIVE của một User
      description: |
        Danh sách gộp tất cả thiết bị của User cùng trạng thái session ACTIVE.
        - Dòng có `sessionId != null` → đang online → Admin có thể force terminate.
        - Revoke session: `DELETE /api/v1/sessions/admin/{sessionId}`.
        - Không có `isCurrent` — Admin không phải User đang dùng thiết bị đó.
      operationId: adminListUserDeviceSessions
      tags:
        - Admin — User Support
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: ID của User cần xem
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminDeviceSessionView" }
              example:
                - deviceId: "3fa85f64-0000-0000-0000-000000000001"
                  deviceName: "Chrome on macOS"
                  ipAddress: "192.168.1.1"
                  lastSeenAt: "2025-04-05T09:00:00Z"
                  sessionId: "7cb6efb9-0000-0000-0000-000000000002"
                  sessionStatus: "ACTIVE"
                - deviceId: "3fa85f64-0000-0000-0000-000000000003"
                  deviceName: "Safari on iPhone"
                  ipAddress: "10.0.0.5"
                  lastSeenAt: "2025-04-01T14:00:00Z"
                  sessionId: null
                  sessionStatus: null
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller không có ROLE_ADMIN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/admin/users/{userId}/login-activities:
    get:
      summary: UC-015 — Admin xem lịch sử đăng nhập của một User
      description: |
        Lịch sử đăng nhập của một User cụ thể, phân trang, mới nhất trước.
        Dùng để giải quyết khiếu nại, điều tra sự cố tài khoản.
      operationId: adminListUserLoginActivities
      tags:
        - Admin — User Support
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: ID của User cần xem
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
        - name: size
          in: query
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserLoginActivityPage" }
              example:
                data:
                  - result: "SUCCESS"
                    ipAddress: "192.168.1.1"
                    deviceName: "Chrome on macOS"
                    provider: "LOCAL"
                    createdAt: "2025-04-05T08:00:00Z"
                  - result: "FAILED_WRONG_PASSWORD"
                    ipAddress: "10.0.0.1"
                    deviceName: null
                    provider: "LOCAL"
                    createdAt: "2025-04-04T22:00:00Z"
                meta: { page: 0, size: 20, total: 150 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller không có ROLE_ADMIN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/sessions/me:
    get:
      summary: UC-007 — Danh sách thiết bị & trạng thái session
      description: |
        Trả về danh sách tất cả thiết bị của user hiện tại cùng trạng thái session.
        - Device có `isCurrent = true`: thiết bị đang gọi request này.
        - Device có `sessionStatus = ACTIVE`: đang có session active (có thể revoke).
        - Device có `sessionStatus = null`: đã đăng xuất, không có session active.
      operationId: listMyDevices
      tags:
        - Sessions
      responses:
        "200":
          description: Danh sách thiết bị thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceSessionView"
              example:
                - deviceId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  deviceName: "Chrome on macOS"
                  ipAddress: "192.168.1.1"
                  lastSeenAt: "2025-01-01T00:00:00Z"
                  sessionId: "7cb6efb9-82f3-4a14-a3c0-1a2b3c4d5e6f"
                  sessionStatus: "ACTIVE"
                  isCurrent: true
                - deviceId: "8ab5c63d-4618-5473-c4ed-3d074g77bgb7"
                  deviceName: "Firefox on Windows"
                  ipAddress: "10.0.0.5"
                  lastSeenAt: "2024-12-30T10:00:00Z"
                  sessionId: null
                  sessionStatus: null
                  isCurrent: false
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/sessions/me/{sessionId}:
    delete:
      summary: UC-008 — Đăng xuất từ xa một thiết bị/session
      description: |
        Revoke một session cụ thể của user hiện tại từ xa.
        - Không thể dùng để đăng xuất session hiện tại — dùng logout chuẩn (`POST /webgw/auth/logout`).
        - Session phải thuộc về user đang thực hiện request.
        - Session phải ở trạng thái ACTIVE.
        - Sau khi revoke, Web Gateway sẽ được notify để invalidate Redis session ngay lập tức.
      operationId: revokeSession
      tags:
        - Sessions
      parameters:
        - name: sessionId
          in: path
          description: ID của session cần revoke
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Session đã được revoke thành công
        "400":
          description: |
            Không thể revoke session hiện tại qua remote logout.
            ErrorCode: 02006 (CANNOT_REVOKE_CURRENT_SESSION)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "02006"
                message: "Cannot revoke your current session via remote logout. Use standard logout instead."
        "403":
          description: |
            Session không thuộc về user hiện tại.
            ErrorCode: 02005 (SESSION_NOT_BELONG_TO_USER)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "02005"
                message: "Session does not belong to user"
        "404":
          description: |
            Session không tồn tại.
            ErrorCode: 02001 (SESSION_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "02001"
                message: "Session not found"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/login-activities/me:
    get:
      summary: UC-012 — Lịch sử đăng nhập của chính mình
      description: |
        Trả về lịch sử đăng nhập của user hiện tại, phân trang, sắp xếp mới nhất trước.
        - Chỉ trả về activities của chính user — không bao gồm activities của user khác.
        - FAILED activities với IP/userAgent lạ → frontend nên highlight để user chú ý.
        - `deviceId` và `deviceName` có thể null cho các lần đăng nhập thất bại.
      operationId: listMyLoginActivities
      tags:
        - Login Activities
      parameters:
        - name: page
          in: query
          description: Số trang (0-based)
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Số item mỗi trang (max 50)
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Lịch sử đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginActivityPage"
              example:
                content:
                  - result: "SUCCESS"
                    ipAddress: "192.168.1.1"
                    userAgent: "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)..."
                    provider: "LOCAL"
                    createdAt: "2025-01-01T00:00:00Z"
                    deviceId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    deviceName: "Chrome on macOS"
                  - result: "FAILED_WRONG_PASSWORD"
                    ipAddress: "10.0.0.1"
                    userAgent: "Unknown"
                    provider: "LOCAL"
                    createdAt: "2024-12-31T23:59:00Z"
                    deviceId: null      # null khi login thất bại — device chưa được tạo
                    deviceName: null
                page: 0
                size: 20
                totalElements: 50
                totalPages: 3
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AdminDeviceSessionView:
      type: object
      properties:
        deviceId: { type: string, format: uuid }
        deviceName: { type: string, example: "Chrome on macOS" }
        ipAddress: { type: string, example: "192.168.1.1" }
        lastSeenAt: { type: string, format: date-time }
        sessionId: { type: string, format: uuid, nullable: true }
        sessionStatus: { type: string, enum: [ACTIVE], nullable: true }
      required: [deviceId, deviceName, lastSeenAt]

    UserLoginActivityView:
      type: object
      properties:
        result:
          type: string
          enum: [SUCCESS, FAILED_WRONG_PASSWORD, FAILED_ACCOUNT_LOCKED, FAILED_SOCIAL]
        ipAddress: { type: string, example: "192.168.1.1" }
        deviceName: { type: string, nullable: true, example: "Chrome on macOS" }
        provider: { type: string, enum: [LOCAL, GOOGLE] }
        createdAt: { type: string, format: date-time }
      required: [result, ipAddress, provider, createdAt]

    UserLoginActivityPage:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/UserLoginActivityView" }
        meta:
          type: object
          properties:
            page: { type: integer, example: 0 }
            size: { type: integer, example: 20 }
            total: { type: integer, format: int64, example: 150 }
          required: [page, size, total]
      required: [data, meta]

    AdminLoginActivityView:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid, nullable: true }
        username: { type: string, example: "john.doe" }
        result:
          type: string
          enum: [SUCCESS, FAILED_WRONG_PASSWORD, FAILED_ACCOUNT_LOCKED, FAILED_SOCIAL]
        ipAddress: { type: string, example: "192.168.1.50" }
        userAgent: { type: string }
        deviceId: { type: string, format: uuid, nullable: true }
        deviceName: { type: string, nullable: true, example: "Chrome on macOS" }
        provider: { type: string, enum: [LOCAL, GOOGLE] }
        createdAt: { type: string, format: date-time }
      required: [id, username, result, ipAddress, userAgent, provider, createdAt]

    AdminLoginActivityPage:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AdminLoginActivityView" }
        meta:
          type: object
          properties:
            page: { type: integer, example: 0 }
            size: { type: integer, example: 20 }
            total: { type: integer, format: int64, example: 5400 }
          required: [page, size, total]
      required: [data, meta]

    ActiveSessionView:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        username: { type: string, nullable: true, example: "john.doe" }
        deviceName: { type: string, nullable: true, example: "Chrome on macOS" }
        ipAddress: { type: string, example: "192.168.1.10" }
        createdAt: { type: string, format: date-time }
      required: [sessionId, userId, ipAddress, createdAt]

    ActiveSessionsResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/ActiveSessionView" }
      required: [data]

    IamOverviewData:
      type: object
      properties:
        totalUsers:
          type: integer
          format: int64
          description: Số user phân biệt có ít nhất 1 device đã đăng ký
          example: 150
        totalDevices:
          type: integer
          format: int64
          description: Tổng số thiết bị đã ghi nhận
          example: 320
        activeSessions:
          type: integer
          format: int64
          description: Số phiên đang ACTIVE
          example: 45
        failedLoginsToday:
          type: integer
          format: int64
          description: Số lượt đăng nhập thất bại trong ngày (từ 00:00:00 hôm nay)
          example: 12
      required:
        - totalUsers
        - totalDevices
        - activeSessions
        - failedLoginsToday

    IamOverviewResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/IamOverviewData"
      required:
        - data

    DeviceSessionView:
      type: object
      properties:
        deviceId:
          type: string
          format: uuid
          description: Định danh duy nhất của device
        deviceName:
          type: string
          description: Tên thiết bị — system detect từ User-Agent
          example: "Chrome on macOS"
        ipAddress:
          type: string
          description: IP address lần đăng nhập gần nhất
          example: "192.168.1.1"
        lastSeenAt:
          type: string
          format: date-time
          description: Thời điểm hoạt động gần nhất (ISO 8601)
        sessionId:
          type: string
          format: uuid
          nullable: true
          description: ID của session active. null nếu không có session active.
        sessionStatus:
          type: string
          nullable: true
          enum: [ACTIVE, null]
          description: Trạng thái session. null nếu không có session active.
        isCurrent:
          type: boolean
          description: true nếu đây là thiết bị đang thực hiện request này
      required:
        - deviceId
        - deviceName
        - ipAddress
        - lastSeenAt
        - isCurrent

    LoginActivityView:
      type: object
      properties:
        result:
          type: string
          enum:
            - SUCCESS
            - FAILED_WRONG_PASSWORD
            - FAILED_ACCOUNT_LOCKED
            - FAILED_SOCIAL
          description: Kết quả đăng nhập
        ipAddress:
          type: string
          description: IP address của request
          example: "192.168.1.1"
        userAgent:
          type: string
          description: User-Agent của browser
        provider:
          type: string
          enum: [LOCAL, GOOGLE]
          description: Phương thức đăng nhập
        createdAt:
          type: string
          format: date-time
          description: Thời điểm đăng nhập (ISO 8601)
        deviceId:
          type: string
          format: uuid
          nullable: true
          description: ID thiết bị. null nếu login thất bại (device chưa được tạo).
        deviceName:
          type: string
          nullable: true
          description: Tên thiết bị. null nếu deviceId null.
      required:
        - result
        - ipAddress
        - userAgent
        - createdAt

    LoginActivityPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/LoginActivityView"
        page:
          type: integer
          description: Trang hiện tại (0-based)
          example: 0
        size:
          type: integer
          description: Số item mỗi trang
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Tổng số item
          example: 50
        totalPages:
          type: integer
          description: Tổng số trang
          example: 3
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Error code
          example: "02001"
        message:
          type: string
          description: Human-readable error message
          example: "Session not found"
      required:
        - code
        - message

  responses:
    Unauthorized:
      description: Token không hợp lệ hoặc hết hạn
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "invalid_token"
