<div class="register-wrapper bg-slate-50">
  <mat-card class="register-card">
    <mat-card-header class="register-header">
      <mat-card-title class="register-title">Tạo tài khoản</mat-card-title>
      <mat-card-subtitle class="register-subtitle">Đăng ký để sử dụng Apartcom</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="register-content">
      <form [formGroup]="form" (ngSubmit)="register()" class="register-form">

        @if (errorMessage()) {
          <div class="error-banner">
            <mat-icon>error</mat-icon>
            <span>{{ errorMessage() }}</span>
          </div>
        }

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email</mat-label>
          <mat-icon matPrefix>mail</mat-icon>
          <input matInput type="email" formControlName="email" placeholder="john@example.com" autocomplete="email" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Tên đăng nhập (Username)</mat-label>
          <mat-icon matPrefix>alternate_email</mat-icon>
          <input matInput formControlName="username" placeholder="john.doe" autocomplete="username" />
          <mat-hint>Không thể thay đổi sau khi đăng ký.</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Mật khẩu</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput type="password" formControlName="password" autocomplete="new-password" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Họ và tên (tuỳ chọn)</mat-label>
          <mat-icon matPrefix>person</mat-icon>
          <input matInput formControlName="fullName" placeholder="Nguyễn Văn A" autocomplete="name" />
        </mat-form-field>

        <button mat-flat-button class="w-full btn-primary-green" type="submit" [disabled]="isLoading() || form.invalid">
          @if (isLoading()) {
            <mat-spinner></mat-spinner>
            <span>Đang xử lý...</span>
          } @else {
            <span>Đăng ký</span>
          }
        </button>

      </form>

      <div class="divider">
        <span>hoặc</span>
      </div>

      <button mat-stroked-button class="w-full google-btn" type="button" (click)="loginWithGoogle()">
        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="google-icon">
          <g>
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            <path fill="none" d="M0 0h48v48H0z"></path>
          </g>
        </svg>
        <span>Tiếp tục với Google</span>
      </button>

      <div class="login-link">
        Đã có tài khoản? <a routerLink="/">Đăng nhập</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
