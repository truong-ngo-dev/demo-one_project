<div class="dialog-header">
  <h1 mat-dialog-title>Edit Role</h1>
  <p class="dialog-subtitle">Update the description for the <span class="role-name-highlight">{{ role.name }}</span> role.</p>
</div>

<mat-dialog-content>
  <form [formGroup]="form" class="role-form">

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Role Name</mat-label>
      <input matInput [value]="role.name" readonly class="readonly-field" />
      <mat-hint>Role name is immutable and cannot be changed.</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3" placeholder="A short summary of what this role can do." cdkFocusInitial></textarea>
    </mat-form-field>

    @if (errorMessage()) {
      <div class="error-banner">
        <mat-icon class="error-icon">error</mat-icon>
        <span>{{ errorMessage() }}</span>
      </div>
    }

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button class="submit-btn" (click)="submit()" [disabled]="form.invalid || isSubmitting()">
    @if (isSubmitting()) {
      <mat-spinner diameter="20"></mat-spinner>
      <span>Saving...</span>
    } @else {
      <span>Save Changes</span>
    }
  </button>
</mat-dialog-actions>
