<div class="page-container">

  <!-- Page Header -->
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Role Management</h1>
      <p class="page-subtitle">Manage system roles and their associated permissions.</p>
    </div>
    <div class="header-right">
      <button mat-flat-button class="create-role-btn" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon>
        <span>New Role</span>
      </button>
    </div>
  </div>

  <!-- Toolbar: Search & Filters -->
  <div class="page-toolbar">
    <mat-form-field appearance="outline" class="search-form-field">
      <mat-label>Search roles</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input
        matInput
        [ngModel]="keyword()"
        (ngModelChange)="onKeywordChange($event)"
        placeholder="Search by name or description" />
    </mat-form-field>
  </div>

  <!-- Content -->
  <div class="page-content">
    @if (isLoading()) {
      <div class="loading-container">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
    } @else {
      <div class="table-container">
        <table mat-table [dataSource]="roles()" class="roles-table">

          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let role">
              <span class="role-name-badge">{{ role.name }}</span>
            </td>
          </ng-container>

          <!-- Description Column -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let role" class="description-cell">
              {{ role.description }}
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Action</th>
            <td mat-cell *matCellDef="let role" class="actions-cell flex-row flex">
              <button mat-icon-button (click)="openEditDialog(role)" matTooltip="Edit role">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteRole(role)" matTooltip="Delete role">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns" class="table-row"></tr>

          <tr class="mat-mdc-no-data-row" *matNoDataRow>
            <td [attr.colspan]="displayedColumns.length" class="no-data-cell">
              <div class="empty-state-container">
                <mat-icon class="empty-state-icon">shield</mat-icon>
                <p class="empty-state-title">No Roles Found</p>
                <p class="empty-state-subtitle">Get started by creating a new role.</p>
                <button mat-flat-button class="create-role-btn" (click)="openCreateDialog()">
                  <mat-icon>add</mat-icon>
                  <span>New Role</span>
                </button>
              </div>
            </td>
          </tr>

        </table>
      </div>
    }
  </div>

</div>
