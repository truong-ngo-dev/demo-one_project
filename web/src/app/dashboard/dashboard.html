<mat-sidenav-container class="dashboard-container">
  <!-- Sidebar -->
  <mat-sidenav #sidenav mode="side" opened class="dashboard-sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Apartcom Admin</span>
    </div>

    <div class="sidebar-menu">
      <div class="sidebar-section-title">Overview</div>
      <mat-nav-list class="sidebar-nav-list">
        <mat-list-item class="sidebar-item" routerLink="dashboard" routerLinkActive="active">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </mat-list-item>
      </mat-nav-list>

      <div class="sidebar-section-title">Management</div>
      <mat-nav-list class="sidebar-nav-list">
        <mat-list-item class="sidebar-item" routerLink="users" routerLinkActive="active">
          <mat-icon matListItemIcon>group</mat-icon>
          <span matListItemTitle>Users</span>
        </mat-list-item>
        <mat-list-item class="sidebar-item" routerLink="roles" routerLinkActive="active">
          <mat-icon matListItemIcon>shield</mat-icon>
          <span matListItemTitle>Roles</span>
        </mat-list-item>
      </mat-nav-list>

      <div class="sidebar-section-title">Monitoring</div>
      <mat-nav-list class="sidebar-nav-list">
        <mat-list-item class="sidebar-item" routerLink="active-sessions" routerLinkActive="active">
          <mat-icon matListItemIcon>devices</mat-icon>
          <span matListItemTitle>Sessions</span>
        </mat-list-item>
        <mat-list-item class="sidebar-item" routerLink="login-activities" routerLinkActive="active">
          <mat-icon matListItemIcon>history</mat-icon>
          <span matListItemTitle>Login Activities</span>
        </mat-list-item>
      </mat-nav-list>
    </div>

    <div class="sidebar-footer">
      <mat-nav-list class="sidebar-nav-list">
        <mat-list-item class="sidebar-item logout-item" (click)="logout()">
          <mat-icon matListItemIcon>logout</mat-icon>
          <span matListItemTitle>Logout</span>
        </mat-list-item>
      </mat-nav-list>
    </div>
  </mat-sidenav>

  <!-- Main content -->
  <mat-sidenav-content class="dashboard-main">
    <mat-toolbar class="dashboard-header">
      <div class="header-left">
        <button mat-icon-button class="header-action-btn" (click)="sidenav.toggle()" matTooltip="Toggle Sidebar">
          <mat-icon>menu</mat-icon>
        </button>
        <span class="page-title">Dashboard</span>
      </div>

      <div class="header-center">
        <div class="search-box">
          <mat-icon class="search-icon">search</mat-icon>
          <input type="text" placeholder="Search..." class="search-input">
        </div>
      </div>

      <div class="header-right">
        <button mat-icon-button class="header-action-btn" matTooltip="Notifications">
          <mat-icon>notifications</mat-icon>
        </button>
        <button mat-icon-button class="header-action-btn" matTooltip="Settings">
          <mat-icon>settings</mat-icon>
        </button>
        <app-user-avatar [username]="username()" [fullName]="fullName()" [showProfileOptions]="false" />
      </div>
    </mat-toolbar>

    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
