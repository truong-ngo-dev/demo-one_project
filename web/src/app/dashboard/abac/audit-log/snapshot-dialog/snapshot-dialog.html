<div class="dialog-header">
  <h2 mat-dialog-title>Change Snapshot</h2>
  <p class="dialog-subtitle">Review the raw state capture for this audit entry</p>
</div>

<mat-dialog-content>
  <pre class="snapshot-code">{{ formatted }}</pre>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
